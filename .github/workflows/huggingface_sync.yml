name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Replace 'swapnanil-2909/querydeck' with your actual Hugging Face username/space-name
          git push --force https://swapnanil-2909:$HF_TOKEN@huggingface.co/spaces/swapnanil-2909/querydeck main
